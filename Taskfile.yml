version: "3"

tasks:
  build:
    desc: Build taskrail CLI
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build ./cmd/taskrail

  build:cross:
    desc: Cross-compile ./cmd/taskrail for non-native release targets (compile smoke; publishes nothing)
    # Pure GOOS/GOARCH compile check for the platforms Taskrail ships to or intends
    # to run on; -o /dev/null keeps it a smoke (no artifact). windows/arm64 is the
    # optional T-058 release target, compile-checked so it cannot break silently
    # between tags. Guarded by TestTaskfileCrossTargetCoversRequiredPlatforms.
    env:
      CGO_ENABLED: "0"
    cmds:
      - |
        set -e
        for target in windows/amd64 windows/arm64 darwin/amd64 darwin/arm64 linux/arm64; do
          echo "cross-compiling $target"
          GOOS="${target%/*}" GOARCH="${target#*/}" go build -o /dev/null ./cmd/taskrail
        done

  release:
    desc: Build taskrail CLI with an injected release version (VERSION=v0.1.0 task release)
    vars:
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o taskrail ./cmd/taskrail

  taskrail:install:
    desc: Build the working-tree taskrail CLI onto the mise-provided PATH (./bin)
    # CGO_ENABLED=0 + -trimpath make the build byte-reproducible so taskrail:check
    # can compare it against a fresh build; the .exe suffix on Windows lets a bare
    # `taskrail` resolve via PATHEXT. Both build sites must keep these identical —
    # guarded by TestTaskrailBuildsShareReproducibleFlags.
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -trimpath -o bin/taskrail{{if eq OS "windows"}}.exe{{end}} ./cmd/taskrail

  taskrail:check:
    desc: Fail if the taskrail on PATH is stale versus the working tree (POSIX/CI shell; uses mktemp+cmp)
    env:
      CGO_ENABLED: "0"
    cmds:
      - |
        resolved="$(command -v taskrail || true)"
        if [ -z "$resolved" ]; then
          echo "taskrail is not on PATH; run 'mise run setup' or 'task taskrail:install'" >&2
          exit 1
        fi
        tmp="$(mktemp)"
        trap 'rm -f "$tmp"' EXIT
        if ! go build -trimpath -o "$tmp" ./cmd/taskrail; then
          echo "taskrail build failed; fix the working tree before checking freshness" >&2
          exit 1
        fi
        if ! cmp -s "$tmp" "$resolved"; then
          echo "on-PATH taskrail ($resolved) is stale versus the working tree; run 'task taskrail:install'" >&2
          exit 1
        fi

  test:
    desc: Run all tests
    deps: [taskrail:install]
    cmds:
      - go test ./...

  vet:
    desc: Run go vet across all packages
    cmds:
      - go vet ./...

  fmt:check:
    desc: Fail if any Go file needs gofmt
    cmds:
      - |
        out="$(gofmt -l .)"
        if [ -n "$out" ]; then
          echo "gofmt needed on:" >&2
          echo "$out" >&2
          exit 1
        fi

  coverage:gate:
    desc: Fail if active-spec decomposition coverage drops below 100% (repo self-coverage gate)
    # Dogfoods `coverage --min` (T-066): the gate lives only on this command's exit
    # code, so validate stays advisory (a coverage gap never fails validate). The
    # threshold pins the current clean 100% self-coverage; a spec area shipped
    # without a linked task reds the push. N/A (a spec with no coverable areas)
    # exits zero, so activating a freshly-scaffolded spec does not red the gate.
    cmds:
      - go run ./cmd/taskrail coverage --min 100

  run:help:
    desc: Run taskrail help
    cmds:
      - go run ./cmd/taskrail --help

  validate:
    desc: Validate Taskrail planning structure
    cmds:
      - go run ./cmd/taskrail validate

  next:
    desc: Select next eligible task
    cmds:
      - go run ./cmd/taskrail next --json

  check:skills:
    desc: Verify committed .agents/.claude skills match the embedded package (parity)
    cmds:
      - go test ./internal/taskrail -run '^TestCommittedSkillsMatchPackage$'

  skills:regen:
    desc: Regenerate committed .agents/.claude skill copies from the embedded package, then verify parity
    # Copies straight from the embedded source (internal/taskrail/skills) rather
    # than `init --with-skills`, so it needs no built binary and never writes the
    # `.taskrail/` layout marker. Run after editing a packaged skill; the trailing
    # check:skills fails loud if the copies still diverge.
    cmds:
      - rm -rf .agents/skills .claude/skills
      - mkdir -p .agents/skills .claude/skills
      - cp -R internal/taskrail/skills/. .agents/skills/
      - cp -R internal/taskrail/skills/. .claude/skills/
      - task check:skills

  hooks:install:
    desc: Install opt-in git hooks via lefthook (pre-commit, commit-msg, pre-push)
    cmds:
      - |
        if ! command -v lefthook >/dev/null 2>&1; then
          echo "lefthook not found. Install it, then re-run 'task hooks:install':" >&2
          echo "  go install github.com/evilmartians/lefthook@v1.13.6" >&2
          echo "  # or: brew install lefthook" >&2
          exit 1
        fi
        lefthook install
