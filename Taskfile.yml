version: "3"

tasks:
  build:
    desc: Build taskrail CLI
    cmds:
      - go build ./cmd/taskrail

  release:
    desc: Build taskrail CLI with an injected release version (VERSION=v0.1.0 task release)
    vars:
      VERSION: '{{.VERSION | default "0.0.0-dev"}}'
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o taskrail ./cmd/taskrail

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  run:help:
    desc: Run taskrail help
    cmds:
      - go run ./cmd/taskrail --help

  validate:
    desc: Validate Taskrail planning structure
    cmds:
      - go run ./cmd/taskrail validate

  next:
    desc: Select next eligible task
    cmds:
      - go run ./cmd/taskrail next --json

  check:skills:
    desc: Verify mirrored skills are in sync
    cmds:
      - ./scripts/check-skill-mirrors.sh

  hooks:install:
    desc: Install opt-in git hooks via lefthook (pre-commit, commit-msg, pre-push)
    cmds:
      - |
        if ! command -v lefthook >/dev/null 2>&1; then
          echo "lefthook not found. Install it, then re-run 'task hooks:install':" >&2
          echo "  go install github.com/evilmartians/lefthook@v1.13.6" >&2
          echo "  # or: brew install lefthook" >&2
          exit 1
        fi
        lefthook install
