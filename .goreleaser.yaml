# GoReleaser configuration for Taskrail.
#
# Taskrail is a pure-Go, no-cgo, no-native-deps CLI, so this config is the
# trimmed cousin of richer release pipelines: no native build job, no Homebrew
# tap. It builds ./cmd/taskrail for linux/darwin on amd64/arm64 and injects the
# release version into main.version via -ldflags.
#
# Validate locally with:
#   goreleaser check
#   goreleaser release --snapshot --clean
version: 2

project_name: taskrail

before:
  hooks:
    - go mod tidy

builds:
  - id: taskrail
    main: ./cmd/taskrail
    binary: taskrail
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: taskrail
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

# Release notes are supplied by the workflow via `--release-notes` (extracted
# from CHANGELOG.md), so suppress GoReleaser's autogenerated git-log changelog.
changelog:
  disable: true

release:
  draft: false
  prerelease: auto
