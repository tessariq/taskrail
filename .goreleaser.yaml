# GoReleaser configuration for Taskrail.
#
# Taskrail is a pure-Go, no-cgo, no-native-deps CLI, so this config is the
# trimmed cousin of richer release pipelines: no native build job, no automated
# Homebrew publishing. It builds ./cmd/taskrail for linux/darwin on amd64/arm64
# and injects the release version into main.version via -ldflags. The Homebrew
# tap (tessariq/homebrew-tap) is maintained by hand -- see the note by `release`.
#
# Validate locally with:
#   goreleaser check
#   goreleaser release --snapshot --clean
version: 2

project_name: taskrail

before:
  hooks:
    - go mod tidy

builds:
  - id: taskrail
    main: ./cmd/taskrail
    binary: taskrail
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: taskrail
    formats:
      - tar.gz
    # WinGet requires a zip installer; GoReleaser only emits the winget manifest
    # as zip+portable when the Windows archive is a zip, so override just that OS
    # (unix stays tar.gz).
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

# Release notes are supplied by the workflow via `--release-notes` (extracted
# from CHANGELOG.md). Passing --release-notes already skips GoReleaser's own
# changelog generation, so no extra suppression is needed here.
#
# Do NOT set `changelog.disable: true`: it skips the entire release-notes phase,
# which means --release-notes is never read and the GitHub release body ships
# empty. Leaving the changelog enabled lets --release-notes override it.
changelog:
  use: git

release:
  draft: false
  prerelease: auto

# WinGet distribution IS automated here, via GoReleaser's built-in winget
# publisher (open-source tier) -- not the standalone winget-releaser action.
# GoReleaser packages the Windows zip as InstallerType: zip with
# NestedInstallerType: portable (Taskrail is a single binary, so no MSI/NSIS
# authoring is needed) and opens a PR from the Tessariq/winget-pkgs fork against
# microsoft/winget-pkgs.
#
# The default GITHUB_TOKEN cannot open a cross-repository PR, so the release
# workflow passes a classic PAT with `public_repo` scope as WINGET_TOKEN
# (release.yml). The fork and that secret are provisioned at release time
# (T-078); `goreleaser check` validates config syntax, not the fork's existence.
# See docs/workflow/releasing.md for the moderation-review latency and the
# first-submission bootstrap.
winget:
  - name: taskrail
    publisher: Tessariq
    package_identifier: Tessariq.Taskrail
    license: Apache-2.0
    homepage: https://github.com/tessariq/taskrail
    short_description: Deterministic, file-based task and spec tracking CLI for coding agents.
    publisher_url: https://github.com/tessariq
    publisher_support_url: https://github.com/tessariq/taskrail/issues
    # Push to the Tessariq/winget-pkgs fork and open a PR against the upstream
    # microsoft/winget-pkgs registry; the fork slug is fixed by the
    # Tessariq.Taskrail identifier (T-078 provisions the actual fork).
    repository:
      owner: Tessariq
      name: winget-pkgs
      branch: "taskrail-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
      token: "{{ .Env.WINGET_TOKEN }}"

# Homebrew distribution is NOT automated here. The formula lives in
# tessariq/homebrew-tap and is maintained by hand per release (update the
# version, the four release-asset URLs, and their sha256 sums from
# checksums.txt). GoReleaser's `brews` integration is deprecated, and its
# replacement (`homebrew_casks`) is macOS-only -- it would drop Linuxbrew
# support, which Taskrail's linux builds rely on. Revisit if that changes.
