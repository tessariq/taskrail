name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Verify formatting
        run: task fmt:check

      - name: Verify mirrored workflow skills
        run: task check:skills

      - name: Build taskrail onto the mise PATH
        run: task taskrail:install

      - name: Guard taskrail freshness on PATH
        run: task taskrail:check

      - name: Smoke bare taskrail resolves to the working-tree build
        run: taskrail validate

  build-test:
    needs: checks
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Build
        run: task build

      - name: Vet
        run: task vet

      - name: Test
        run: task test

      - name: Smoke --help
        run: task run:help

      - name: Smoke validate
        run: task validate

  cross-compile:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@v4

      - name: Cross-compile smoke (windows/darwin/linux-arm targets)
        run: task build:cross
