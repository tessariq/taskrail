name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # --- Tag push: real, published release ---

      - name: Guard CHANGELOG has a section for this tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/check-changelog-version.sh "${GITHUB_REF_NAME}"

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./scripts/changelog-release-notes.sh "${GITHUB_REF_NAME}" > "${RUNNER_TEMP}/release-notes.md"

      - name: Guard release notes are non-empty
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ! -s "${RUNNER_TEMP}/release-notes.md" ]; then
            echo "guard: release notes file is empty; refusing to publish a release with a blank body" >&2
            exit 1
          fi
          echo "guard: release notes present ($(wc -c < "${RUNNER_TEMP}/release-notes.md") bytes)"

      - name: Run GoReleaser (publish)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo PR to microsoft/winget-pkgs; GITHUB_TOKEN cannot open it.
          # Classic PAT with public_repo scope, provisioned at release time (T-078).
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}

      # --- Manual dispatch: snapshot only, no GitHub Release ---

      - name: Run GoReleaser (snapshot, no publish)
        if: github.event_name == 'workflow_dispatch'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --snapshot --clean
