name: Planning checks

# Fast lane for planning-/spec-/doc-only changes. The full CI matrix and cross-compile
# in ci.yml skip these paths (see paths-ignore there), so this workflow preserves the two
# cheap gates that matter most exactly when planning files change — taskrail state
# validation and active-spec coverage — without spinning up the cross-platform build/test
# matrix. Its `paths:` set is the exact mirror of the paths ignored by ci.yml; keep them
# identical. release.yml (tags-only) is unaffected.
on:
  push:
    branches:
      - main
    paths:
      - 'planning/**'
      - 'specs/**'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
  pull_request:
    paths:
      - 'planning/**'
      - 'specs/**'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'

permissions:
  contents: read

concurrency:
  group: planning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Planning + docs checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Provision toolchain (mise)
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1

      - name: Validate Taskrail planning structure
        run: task validate

      - name: Gate active-spec self-coverage (coverage --min 100)
        run: task coverage:gate
